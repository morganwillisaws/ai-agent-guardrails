<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnyCompany Robotics - AI Customer Service</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 1rem; background: #16213e; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.2rem; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  .btn-primary { background: #6c63ff; color: white; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; padding: 1rem; }
  .messages { flex: 1; overflow-y: auto; padding: 1rem 0; }
  .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 8px; max-width: 80%; white-space: pre-wrap; line-height: 1.5; }
  .message.user { background: #0f3460; margin-left: auto; }
  .message.assistant { background: #16213e; border: 1px solid #333; }
  .message.system { background: transparent; border: 1px dashed #333; color: #888; text-align: center; max-width: 100%; font-size: 0.85rem; }
  .message.typing { background: #16213e; border: 1px solid #333; max-width: 80px; }
  .message.typing::after { content: ''; display: inline-block; animation: dots 1.5s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  .input-area { display: flex; gap: 0.5rem; padding-top: 1rem; border-top: 1px solid #333; }
  .input-area input { flex: 1; padding: 0.75rem; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #eee; font-size: 1rem; }
  .input-area input:focus { outline: none; border-color: #6c63ff; }
  .login-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
  .login-container p { color: #888; }
  .status { font-size: 0.8rem; color: #aaa; margin-right: 0.5rem; }
</style>
</head>
<body>
  <div class="header">
    <h1>AnyCompany Robotics - AI Customer Service</h1>
    <div style="display:flex;align-items:center;">
      <span id="userInfo" class="status"></span>
      <button id="authBtn" class="btn btn-primary" onclick="handleAuth()">Login</button>
    </div>
  </div>
  <div id="loginView" class="login-container">
    <h2>Welcome</h2>
    <p>Sign in to chat with the customer service agent</p>
    <button class="btn btn-primary" onclick="handleAuth()">Sign in with Cognito</button>
  </div>
  <div id="chatView" class="container" style="display:none;">
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    const CONFIG = {
      cognitoDomain: 'robot-vacuum-832211724792.auth.us-east-1.amazoncognito.com',
      clientId: '3kig0rtqcon6uq1u4hldsqmmct',
      redirectUri: window.location.origin + '/callback',
      apiEndpoint: 'https://4p3s0sh1v2.execute-api.us-east-1.amazonaws.com/prod',
    };
    let idToken = null;
    function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1]));}catch{return null;}}
    function handleAuth(){
      if(idToken){idToken=null;sessionStorage.clear();updateUI();return;}
      window.location.href='https://'+CONFIG.cognitoDomain+'/oauth2/authorize?client_id='+CONFIG.clientId+'&response_type=code&scope=openid+profile&redirect_uri='+encodeURIComponent(CONFIG.redirectUri);
    }
    async function exchangeCode(code){
      const r=await fetch('https://'+CONFIG.cognitoDomain+'/oauth2/token',{
        method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({grant_type:'authorization_code',client_id:CONFIG.clientId,code:code,redirect_uri:CONFIG.redirectUri}),
      });
      if(!r.ok){alert('Auth failed: '+r.status);return;}
      const tokens=await r.json();
      idToken=tokens.id_token;
      sessionStorage.setItem('idToken',idToken);
      window.history.replaceState({},'','/');
      updateUI();
    }
    async function sendMessage(){
      const input=document.getElementById('messageInput');
      const text=input.value.trim();
      if(!text||!idToken)return;
      input.value='';
      addMsg(text,'user');
      const typing=addMsg('','typing');
      document.getElementById('sendBtn').disabled=true;
      document.getElementById('messageInput').disabled=true;
      try{
        const sessionId=sessionStorage.getItem('sid')||'default';
        const r=await fetch(CONFIG.apiEndpoint+'/chat',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Authorization':'Bearer '+idToken,
            'X-Amzn-Bedrock-AgentCore-Runtime-Session-Id':sessionId,
          },
          body:JSON.stringify({prompt:text}),
        });
        typing.remove();
        if(!r.ok){addMsg('Error '+r.status+': '+await r.text(),'system');return;}
        const data=await r.json();
        addMsg(data.response||JSON.stringify(data),'assistant');
      }catch(e){typing.remove();addMsg('Error: '+e.message,'system');}
      finally{document.getElementById('sendBtn').disabled=false;document.getElementById('messageInput').disabled=false;}
    }
    function addMsg(text,type){
      const m=document.getElementById('messages');
      const d=document.createElement('div');d.className='message '+type;d.textContent=text;
      m.appendChild(d);m.scrollTop=m.scrollHeight;return d;
    }
    function updateUI(){
      document.getElementById('loginView').style.display=idToken?'none':'flex';
      document.getElementById('chatView').style.display=idToken?'flex':'none';
      document.getElementById('authBtn').textContent=idToken?'Logout':'Login';
      if(idToken){
        const c=parseJwt(idToken);
        document.getElementById('userInfo').textContent=(c?.['cognito:username']||'')+(c?.['custom:customer_id']?' (customer '+c['custom:customer_id']+')':'');
        if(!sessionStorage.getItem('sid'))sessionStorage.setItem('sid',crypto.randomUUID());
      }else{document.getElementById('userInfo').textContent='';}
    }
    const code=new URLSearchParams(window.location.search).get('code');
    if(code){exchangeCode(code);}
    else{idToken=sessionStorage.getItem('idToken');updateUI();}
  </script>
</body>
</html>
